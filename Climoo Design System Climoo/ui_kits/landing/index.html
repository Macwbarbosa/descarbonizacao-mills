<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climoo — Landing UI Kit</title>
<link rel="icon" type="image/png" href="../../assets/logos/climoo-white.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--climoo-bg-page);
    font-family: var(--climoo-font-body);
    color: var(--climoo-text-1);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }
</style>
</head>
<body data-screen-label="01 Home">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Button.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="TrustedBy.jsx"></script>
<script type="text/babel" src="SolutionsCarousel.jsx"></script>
<script type="text/babel" src="StandardsBar.jsx"></script>
<script type="text/babel" src="WhyChoose.jsx"></script>
<script type="text/babel" src="WhoWeAre.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="CTAPanel.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel" data-presets="env,react">
function App() {
  const onCTAClick = () => {
    alert("Demo modal stub — in the real site this opens DemoModal with name/email/company fields.");
  };
  return (
    <>
      <Header onCTAClick={onCTAClick} />
      <Hero onCTAClick={onCTAClick} />
      <TrustedBy />
      <SolutionsCarousel />
      <StandardsBar />
      <WhyChoose />
      <WhoWeAre />
      <Stats />
      <CTAPanel onCTAClick={onCTAClick} />
      <Footer />
    </>
  );
}

// Wait one tick so the babel-transformed JSX components register on window
// before we read them. Then mount.
const mount = () => {
  if (!window.Header || !window.Footer) { setTimeout(mount, 30); return; }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
};
mount();
</script>

</body>
</html>
