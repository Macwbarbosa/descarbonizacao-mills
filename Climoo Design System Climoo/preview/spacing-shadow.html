<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing — Shadow elevations</title>
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="card">

<style>
.s-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.s{height:96px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:13px;color:#374151;font-weight:600;}
.cap{font-family:ui-monospace,monospace;font-size:10px;color:#6b7280;margin-top:6px;line-height:1.4;}
</style>
<div class="s-grid">
<div><div class="s" style="box-shadow:0 4px 16px rgba(0,0,0,0.07)">soft / image</div><div class="cap">0 4 16 · rgba(0,0,0,.07)</div></div>
<div><div class="s" style="box-shadow:0 5px 28px rgba(0,0,0,0.10)">card</div><div class="cap">0 5 28 · rgba(0,0,0,.10)</div></div>
<div><div class="s" style="box-shadow:0 12px 32px rgba(0,0,0,0.10)">hero drop</div><div class="cap">0 12 32 · rgba(0,0,0,.10)</div></div>
<div><div class="s" style="box-shadow:0 2px 12px rgba(33,8,86,0.10)">arrow rest</div><div class="cap">0 2 12 · rgba(33,8,86,.10)</div></div>
<div><div class="s" style="box-shadow:0 4px 20px rgba(33,8,86,0.25)">arrow hover</div><div class="cap">0 4 20 · rgba(33,8,86,.25)</div></div>
<div><div class="s" style="background:rgba(33,8,86,0.7);color:#fff;box-shadow:0 4px 32px rgba(0,0,0,0.3)">scrolled pill</div><div class="cap">0 4 32 · rgba(0,0,0,.30)</div></div>
</div>
</div></body></html>
