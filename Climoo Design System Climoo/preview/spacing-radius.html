<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing — Radius scale</title>
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="card">

<style>
.rrow{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
.r{background:linear-gradient(145deg,#7c3aed 0%,#4c1d95 60%,#3b0764 100%);color:#fff;width:96px;height:96px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;}
.lbl{font-family:ui-monospace,monospace;font-size:11px;color:#6b7280;margin-top:6px;text-align:center;}
.lbl b{display:block;font-family:'Outfit',sans-serif;color:#111827;font-size:12px;font-weight:600;}
</style>
<div class="rrow">
<div><div class="r" style="border-radius:12px">12</div><div class="lbl"><b>sm</b>12px</div></div>
<div><div class="r" style="border-radius:14px">14</div><div class="lbl"><b>md</b>14px</div></div>
<div><div class="r" style="border-radius:16px">16</div><div class="lbl"><b>lg</b>16px</div></div>
<div><div class="r" style="border-radius:20px">20</div><div class="lbl"><b>xl · cards</b>20px</div></div>
<div><div class="r" style="border-radius:24px">24</div><div class="lbl"><b>2xl</b>24px</div></div>
<div><div class="r" style="border-radius:28px">28</div><div class="lbl"><b>3xl · CTA</b>28px</div></div>
<div><div class="r" style="border-radius:99px;width:170px;height:50px;align-items:center;padding:0">99 pill</div><div class="lbl"><b>pill · buttons</b>99px</div></div>
</div>
</div></body></html>
