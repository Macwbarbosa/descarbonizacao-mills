<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Surfaces</title>
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="card">

<div class="row">
<div class="col"><div class="swatch" style="background:#e4ebf0;color:#210856">Page</div><div class="lbl"><b>Page · cool blue-gray</b><span class="mono">#E4EBF0</span></div></div>
<div class="col"><div class="swatch" style="background:#f3f4f6;color:#210856">Card</div><div class="lbl"><b>Card fill</b><span class="mono">#F3F4F6</span></div></div>
<div class="col"><div class="swatch" style="background:#ffffff;color:#210856;box-shadow:inset 0 0 0 1px #e5e7eb,0 5px 28px rgba(0,0,0,0.06)">Surface</div><div class="lbl"><b>White surface</b><span class="mono">#FFFFFF</span></div></div>
<div class="col"><div class="swatch" style="background:#e5e7eb;color:#374151">Border</div><div class="lbl"><b>Soft border</b><span class="mono">#E5E7EB</span></div></div>
<div class="col"><div class="swatch" style="background:#1b0753">Dark bg</div><div class="lbl"><b>Footer / Stats</b><span class="mono">#1B0753</span></div></div>
<div class="col"><div class="swatch" style="background:rgba(33,8,86,0.6);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.2),0 4px 32px rgba(0,0,0,0.3);backdrop-filter:blur(4px)">Pill</div><div class="lbl"><b>Scrolled header tint</b><span class="mono">rgba(33,8,86,.6)</span></div></div>
</div>
</div></body></html>
