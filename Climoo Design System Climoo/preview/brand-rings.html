<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand — Concentric gradient rings</title>
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="card">

<style>
.stage{position:relative;background:#341472;border-radius:14px;height:230px;overflow:hidden;}
.ring{position:absolute;border-radius:50%;border:2px solid transparent;background:linear-gradient(#341472,#341472) padding-box,linear-gradient(to bottom,#62d0e5 0%,#9354e0 50%,#371776 100%) border-box;}
.r1{width:880px;height:880px;top:120px;left:240px;}
.r2{width:680px;height:680px;top:170px;left:340px;}
.r3{width:480px;height:480px;top:230px;left:440px;}
.r4{width:280px;height:280px;top:280px;left:540px;}
.ttl{position:absolute;left:36px;top:60px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;max-width:280px;line-height:1.1;z-index:2;}
</style>
<div class="stage">
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="ring r4"></div>
  <div class="ttl">Solution hero — gradient border rings</div>
</div>
<div class="mono" style="margin-top:8px;color:#6b7280">4 nested rings · padding-box/border-box gradient border trick</div>
</div></body></html>
