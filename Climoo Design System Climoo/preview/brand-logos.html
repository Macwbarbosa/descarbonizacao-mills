<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand — Logos</title>

</head>

<div class="card">

<style>
.lr{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

</style>
<div class="lr">
  <div><div class="lc"><img src="../assets/logos/horizontal-logo-dark.png" alt="Climoo dark"></div><div class="cap">horizontal-logo-dark.png · light bg</div></div>
  <div><div class="lc dark"><img src="../assets/logos/horizontal-logo.png" alt="Climoo white"></div><div class="cap">horizontal-logo.png · dark bg</div></div>
</div>
