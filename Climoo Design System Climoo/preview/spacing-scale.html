<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing — Scale & rhythm</title>
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="card">

<style>
.sp{display:flex;align-items:center;gap:14px;margin-bottom:6px;font-family:'Outfit',sans-serif;font-size:12px;color:#374151;}
.bar{background:#9354e0;height:14px;border-radius:3px;}
.tag{font-family:ui-monospace,monospace;color:#6b7280;font-size:11px;width:120px;flex-shrink:0;}
.name{width:80px;color:#111827;font-weight:600;}
</style>
<div class="sp"><div class="name">space-1</div><div class="bar" style="width:4px"></div><div class="tag">4px</div></div>
<div class="sp"><div class="name">space-2</div><div class="bar" style="width:8px"></div><div class="tag">8px</div></div>
<div class="sp"><div class="name">space-3</div><div class="bar" style="width:12px"></div><div class="tag">12px</div></div>
<div class="sp"><div class="name">space-4</div><div class="bar" style="width:16px"></div><div class="tag">16px · card gap</div></div>
<div class="sp"><div class="name">space-6</div><div class="bar" style="width:24px"></div><div class="tag">24px · drawer padding</div></div>
<div class="sp"><div class="name">space-8</div><div class="bar" style="width:32px"></div><div class="tag">32px · card padding</div></div>
<div class="sp"><div class="name">space-12</div><div class="bar" style="width:48px"></div><div class="tag">48px · section header gap</div></div>
<div class="sp"><div class="name">space-16</div><div class="bar" style="width:64px"></div><div class="tag">64px · grid gap (desktop)</div></div>
<div class="sp"><div class="name">space-24</div><div class="bar" style="width:96px"></div><div class="tag">96px · light section pad</div></div>
<div class="sp"><div class="name">space-32</div><div class="bar" style="width:132px"></div><div class="tag">132px · major section pad</div></div>
<div class="sp"><div class="name">space-34</div><div class="bar" style="width:138px"></div><div class="tag">138px · stats / footer pad</div></div>
</div></body></html>
