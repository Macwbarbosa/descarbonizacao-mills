<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components — Buttons</title>
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="card">

<style>
.btn{font-family:'Outfit',sans-serif;font-weight:500;font-size:16px;height:50px;padding:0 36px;border-radius:99px;border:none;cursor:pointer;display:inline-flex;align-items:center;white-space:nowrap;transition:all .2s;}
.row1{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.row2{background:#210856;padding:18px;border-radius:14px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.note{font-family:ui-monospace,monospace;font-size:10px;color:#6b7280;margin-top:6px;}
</style>
<div class="row1">
  <button class="btn" style="background:#210856;color:#fff;">Schedule a demo</button>
  <button class="btn" style="background:#9354e0;color:#fff;">Hover state (violet)</button>
  <button class="btn" style="background:#fff;color:#210856;box-shadow:inset 0 0 0 1.5px #210856;">Secondary</button>
</div>
<div class="note">Primary CTA · <code>#210856</code> on light; swaps to <code>#9354E0</code> on hover</div>

<div style="height:10px"></div>
<div class="row2">
  <button class="btn" style="background:#9354e0;color:#fff;">Schedule a demo</button>
  <button class="btn" style="background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.6);">Sign in</button>
</div>
<div class="note">On dark hero · violet primary + ghost outline secondary</div>
</div></body></html>
